<html>
    <head>
      <!-- Document Title -->
        <title>Pokemon API</title>
    </head>
    <body>
        <div class="container">
          <!-- Heading for the Page -->
            <h1 style="text-align: center;">App Displaying Pokemon using API using HTML,CSS,JS and to search Pokemon </h1>
            <!--Search box to find the Pokemon-->
            <div class="box" style="text-align: center;">
        <input id="searchbar" class="poke-search" onkeyup="search_pokemon()" type="text"
        name="search" placeholder="Search Pokemon.." style="width: 62%; position: relative; margin-right: 10%;">
        </div>
        <!--Displaying Pokemon Card's-->
            <ul id="pokedex" style="display: flex;flex-wrap: wrap;"></ul>
        </div>
        <!--  function to search pokemon (by Pokemon Type and Pokemon Name)-->
        <script>
        function search_pokemon() {
            let input = document.getElementById('searchbar').value;
            input = input.toLowerCase();
            let x = document.getElementsByClassName('card');
            for (let i = 0; i < x.length; i++) {
                if (!x[i].innerHTML.toLowerCase().includes(input)) {
                    x[i].style.display = "none";
                } else {
                    x[i].style.display = "list-item";
                }
            }
        }
        </script>
        <script src="index.js"></script>
    </body>
</html>
